name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            compiler: msvc
            cmake_args: '-G "Visual Studio 17 2022" -A x64'
            build_args: '--config Release'
            test_args: '-C Release'

          - os: ubuntu-latest
            compiler: gcc
            cc: gcc-13
            cxx: g++-13
            packages: g++-13
            cmake_args: '-DCMAKE_BUILD_TYPE=Release'
            build_args: ''
            test_args: ''

          - os: ubuntu-latest
            compiler: clang
            cc: clang-17
            cxx: clang++-17
            packages: clang-17
            cmake_args: '-DCMAKE_BUILD_TYPE=Release'
            build_args: ''
            test_args: ''

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.compiler }} (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_args }}
        env:
          CC: ${{ matrix.cc || '' }}
          CXX: ${{ matrix.cxx || '' }}

      - name: Build
        run: cmake --build build ${{ matrix.build_args }}

      - name: Test
        run: ctest --test-dir build ${{ matrix.test_args }} --output-on-failure

  doc-examples:
    runs-on: windows-latest
    name: doc examples (MSVC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test all documentation examples
        shell: bash
        run: python scripts/test_docs.py docs/*.md
